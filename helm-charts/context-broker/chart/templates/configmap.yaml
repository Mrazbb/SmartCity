apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "context-broker.fullname" . }}-conf
  labels:
    {{- include "context-broker.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        # Forward temporal API to Mintaka
        location ~ ^/ngsi-ld/v1/temporal/entities {
            proxy_pass http://{{ .Values.config.mintakaHost }}:{{ .Values.config.mintakaPort }};
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Forward everything else to Orion-LD
        location / {
            proxy_pass http://{{ .Values.config.orionHost }}:{{ .Values.config.orionPort }};
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }