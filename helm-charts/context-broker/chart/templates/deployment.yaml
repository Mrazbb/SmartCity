apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "context-broker.fullname" . }}
  labels:
    {{- include "context-broker.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "context-broker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "context-broker.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "context-broker.fullname" . }}-conf