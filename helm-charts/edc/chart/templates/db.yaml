apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "edc.fullname" . }}-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "edc.fullname" . }}-db
  template:
    metadata:
      labels:
        app: {{ include "edc.fullname" . }}-db
    spec:
      containers:
      - name: postgres
        image: {{ .Values.db.image }}
        env:
        - name: POSTGRES_USER
          value: {{ .Values.db.user }}
        - name: POSTGRES_PASSWORD
          value: {{ .Values.db.password }}
        - name: POSTGRES_DB
          value: {{ .Values.db.name }}
        ports:
        - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "edc.fullname" . }}-db
spec:
  ports:
  - port: 5432
  selector:
    app: {{ include "edc.fullname" . }}-db