{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "edc.fullname" . }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tlsSecretName }}
  tls:
  - hosts:
    - {{ .Values.ingress.host }}
    secretName: {{ .Values.ingress.tlsSecretName }}
  {{- end }}
  rules:
  - host: {{ .Values.ingress.host }}
    http:
      paths:
      - path: /api/management
        pathType: Prefix
        backend:
          service:
            name: {{ include "edc.fullname" . }}-connector
            port:
              number: 11002
      - path: /api/v1/dsp
        pathType: Prefix
        backend:
          service:
            name: {{ include "edc.fullname" . }}-connector
            port:
              number: 11003
      - path: /api/public
        pathType: Prefix
        backend:
          service:
            name: {{ include "edc.fullname" . }}-connector
            port:
              number: 11005
      - path: /api/proxy
        pathType: Prefix
        backend:
          service:
            name: {{ include "edc.fullname" . }}-connector
            port:
              number: 11006
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ include "edc.fullname" . }}-ui
            port:
              number: 8080
{{- end }}