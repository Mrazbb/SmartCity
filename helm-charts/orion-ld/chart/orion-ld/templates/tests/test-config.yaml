apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Release.Name }}-orion-test"
  labels:
    {{ include "orion.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
data:
  test.sh: |-
    curl -f -X POST http://{{ include "orion.fullname" . }}.{{ .Release.Namespace }}:{{ .Values.service.port }}/ngsi-ld/v1/entities \
                 -H 'Content-Type: application/ld+json' \
                 -d '{
                    "id": "urn:ngsi-ld:test:test-entity",
                    "type": "test",
                    "@context":["https://uri.etsi.org/ngsi-ld/v1/ngsi-ld-core-context.jsonld"]
                    }' \
                 --retry 30 \
                 --retry-delay 10 \
                 --retry-connrefused 

    curl -f -X GET http://{{ include "orion.fullname" . }}.{{ .Release.Namespace }}:{{ .Values.service.port }}/ngsi-ld/v1/entities/urn:ngsi-ld:test:test-entity \
                 --retry 30 \
                 --retry-delay 10 \
                 --retry-connrefused

    curl -f -X DELETE http://{{ include "orion.fullname" . }}.{{ .Release.Namespace }}:{{ .Values.service.port }}/ngsi-ld/v1/entities/urn:ngsi-ld:test:test-entity \
                 --retry 30 \
                 --retry-delay 10 \
                 --retry-connrefused
