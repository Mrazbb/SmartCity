apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ include "quantumleap.fullname" . }}-test-db"
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
data:
  test.sh: |-
    # Post NGSI-LD Notification 
    # Note: Using /v2/notify and NGSILD-Tenant header
    curl -f -X POST {{ include "quantumleap.fullname" . }}:{{ .Values.quantumleap.service.internalPort }}/v2/notify \
    -H 'NGSILD-Tenant: test' \
    -H 'Content-Type: application/json' \
    -d '{
    "id": "urn:ngsi-ld:Notification:test-123",
    "type": "Notification",
    "subscriptionId": "urn:ngsi-ld:Subscription:simulated-subscription-notification",
    "data": [
        {
            "id": "urn:ngsi-ld:test:test-entity",
            "type": "test",
            "test": {
                "type": "Property",
                "value": 0
            },
            "@context": "https://uri.etsi.org/ngsi-ld/v1/ngsi-ld-core-context.jsonld"
        }
    ]
    }' \
    --retry 10 \
    --retry-delay 10 \
    --retry-connrefused

    # Delete the entity using NGSI-v2 endpoint
    curl -f -X DELETE {{ include "quantumleap.fullname" . }}:{{ .Values.quantumleap.service.internalPort }}/v2/entities/urn:ngsi-ld:test:test-entity \
    -H 'NGSILD-Tenant: test'