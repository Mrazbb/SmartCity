apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "scorpioBroker-aaio.fullname" . }}
  labels:
    {{- include "scorpioBroker-aaio.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "scorpioBroker-aaio.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "scorpioBroker-aaio.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "scorpioBroker-aaio.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: DBHOST
              value: {{ include "scorpioBroker-aaio.fullname" . }}-postgres
            - name: DBPORT
              value: "5432"
            - name: DBUSER
              value: "ngb"
            - name: DBPASS
              value: "ngb"
            - name: DBNAME
              value: "ngb"
            - name: QUARKUS_DATASOURCE_JDBC_URL
              value: "jdbc:postgresql://{{ include "scorpioBroker-aaio.fullname" . }}-postgres:5432/ngb?ApplicationName=aio-runner"
            - name: QUARKUS_DATASOURCE_REACTIVE_URL
              value: "postgresql://{{ include "scorpioBroker-aaio.fullname" . }}-postgres:5432/ngb?ApplicationName=aio-runner"
          ports:
            - containerPort: 9090
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: 9090
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
